<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Vocal Lab</title><style>
body{margin:0;font-family:Arial;background:#f5f5f7}h2,#display{text-align:center}#display{font-size:24px;font-weight:bold;margin:10px}#wrap{overflow-x:auto;padding:20px}#piano{position:relative;height:260px;display:inline-block}.white{width:64px;height:240px;background:#fff;border:1px solid #333;display:inline-block;box-sizing:border-box;position:relative}.white span{position:absolute;bottom:8px;width:100%;text-align:center;font-size:12px}.black{position:absolute;width:40px;height:150px;background:#111;color:#fff;border-radius:0 0 4px 4px;z-index:10}.black span{position:absolute;bottom:6px;width:100%;text-align:center;font-size:11px}
</style></head><body><h2>🎹 Vocal Lab Piano (C4–C6)</h2><div id="display">点击琴键</div><div id="wrap"><div id="piano"></div></div><script>
const freqs={'C4': 261.63, 'C#4': 277.18, 'D4': 293.66, 'D#4': 311.13, 'E4': 329.63, 'F4': 349.23, 'F#4': 369.99, 'G4': 392.0, 'G#4': 415.3, 'A4': 440.0, 'A#4': 466.16, 'B4': 493.88, 'C5': 523.25, 'C#5': 554.37, 'D5': 587.33, 'D#5': 622.25, 'E5': 659.25, 'F5': 698.46, 'F#5': 739.99, 'G5': 783.99, 'G#5': 830.61, 'A5': 880.0, 'A#5': 932.33, 'B5': 987.77, 'C6': 1046.5};
const order=['C4', 'C#4', 'D4', 'D#4', 'E4', 'F4', 'F#4', 'G4', 'G#4', 'A4', 'A#4', 'B4', 'C5', 'C#5', 'D5', 'D#5', 'E5', 'F5', 'F#5', 'G5', 'G#5', 'A5', 'A#5', 'B5', 'C6'];
const piano=document.getElementById('piano'),disp=document.getElementById('display');
const whiteW=64,blackAfter={C:0,D:1,F:3,G:4,A:5};
let w=0;
order.forEach(n=>{if(!n.includes('#')){let d=document.createElement('div');d.className='white';d.dataset.note=n;d.innerHTML='<span>'+n+'</span>';piano.appendChild(d);w++;}});
piano.style.width=(w*whiteW)+'px';
order.forEach(n=>{if(n.includes('#')){let o=parseInt(n.slice(-1)),b=(o===5?7:0)+blackAfter[n[0]];let k=document.createElement('div');k.className='black';k.dataset.note=n;k.style.left=(b*whiteW+44)+'px';k.innerHTML='<span>'+n+'</span>';piano.appendChild(k);}});
const AC=window.AudioContext||window.webkitAudioContext;const ctx=new AC();let osc,g;
function stop(){if(osc){g.gain.exponentialRampToValueAtTime(.0001,ctx.currentTime+.05);osc.stop(ctx.currentTime+.06);osc=null;}}
function play(n){stop();osc=ctx.createOscillator();g=ctx.createGain();osc.type='triangle';osc.frequency.value=freqs[n];osc.connect(g);g.connect(ctx.destination);g.gain.value=.0001;osc.start();g.gain.exponentialRampToValueAtTime(.25,ctx.currentTime+.02);disp.textContent=n+' '+freqs[n].toFixed(2)+' Hz';}
document.addEventListener('pointerdown',e=>{let t=e.target.closest('.white,.black');if(t)play(t.dataset.note);});
document.addEventListener('pointerup',stop);
</script></body></html>
